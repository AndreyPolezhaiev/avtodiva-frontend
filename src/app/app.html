<header class="main-header">
  <div class="logo">AvtoDiva Admin</div>
  <nav class="actions">
    <button class="btn btn-add" (click)="createCar()">➕</button>
    <button class="btn btn-get-by-id" (click)="getCarById()">Взять по ID</button>
    <button class="btn btn-refresh" (click)="getAllCars()">🔄 Обновить список</button>
  </nav>
</header>

<div class="container">
  @for (car of cars(); track car.id) { 
    <div class="car-card">
      <div class="car-name">🚗 {{ car.name }}</div>
      <div class="car-id">ID: {{ car.id }}</div>
      
      <div class="card-actions">
        <button class="btn-icon" (click)="updateCar(car)">✏️</button>
        <button class="btn-icon" (click)="deleteCarById(car.id)">🗑️</button>
      </div>
    </div>
  } @empty {
    <div class="empty-state">
      <p>There are no cars yet... Time to add some!</p>
    </div>
  }
</div>
